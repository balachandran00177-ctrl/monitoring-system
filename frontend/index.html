<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Energy Monitoring System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-container" id="loginContainer">
            <div class="logo-section">
                <h1>⚡ Energy Monitor</h1>
                <p>Cloud-Based Electricity Consumption Tracking</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="loginTab" class="tab-content active">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div style="position:relative;">
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                        <span onclick="togglePassword('loginPassword', this)" style="position:absolute; right:10px; top:12px; cursor:pointer;">👁</span>
                    </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="registerTab" class="tab-content">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="registerUsername">Username</label>
                        <input type="text" id="registerUsername" required placeholder="Choose a username">
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" required placeholder="Enter your email">
                        <button type="button" onclick="sendOTP()" class="btn btn-secondary">Send OTP</button>
                        <input type="text" id="otp" placeholder="Enter OTP">
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <div style="position:relative;">
                        <input type="password" id="registerPassword" required placeholder="Create a password">
                        <span onclick="togglePassword('registerPassword', this)" style="position:absolute; right:10px; top:12px; cursor:pointer;">👁</span>
                    </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
